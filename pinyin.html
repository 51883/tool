<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文转拼音 - 域名助手</title>
    <script src="https://unpkg.com/pinyin-pro"></script>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 20px;
            font-size: 24px;
        }
        .description {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            text-align: center;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
        }
        textarea {
            width: 100%;
            height: 300px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            resize: vertical;
            font-family: monospace;
        }
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(74,144,226,0.2);
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }
        .btn-convert {
            background-color: var(--primary-color);
            color: white;
        }
        .btn-convert:hover { background-color: #357abd; }
        .btn-copy {
            background-color: #2ecc71;
            color: white;
        }
        .btn-copy:hover { background-color: #27ae60; }
        .btn-clear {
            background-color: #e74c3c;
            color: white;
        }
        .btn-clear:hover { background-color: #c0392b; }
        .options {
            margin-top: 15px;
            font-size: 13px;
            color: #555;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>中文转拼音 (域名专用)</h1>
    <p class="description">输入多行中文关键词，自动转为无声调拼音，适用于域名注册查询。</p>
    
    <div class="grid">
        <div>
            <label>输入中文关键词 (每行一个):</label>
            <textarea id="inputArea" placeholder="例如：
百度
阿里云
腾讯云"></textarea>
        </div>
        <div>
            <label>转换结果 (拼音):</label>
            <textarea id="outputArea" readonly placeholder="结果将显示在这里..."></textarea>
        </div>
    </div>

    <div class="options">
        <label><input type="checkbox" id="removeSpace" checked> 去除空格 (适合域名)</label>
    </div>

    <div class="controls">
        <button class="btn-convert" onclick="convertPinyin()">立即转换</button>
        <button class="btn-copy" onclick="copyResult()">复制结果</button>
        <button class="btn-clear" onclick="clearAll()">清空</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/pinyin-pro/dist/index.min.js"></script>
    
    <script>
        function convertPinyin() {
            // 增加安全检查：确保点击按钮时，库已经加载完成
            if (typeof window.pinyinPro === 'undefined') {
                alert('拼音转换组件正在加载或加载失败，请稍等几秒再试。如果持续失败，请检查网络是否能访问外网。');
                return;
            }

            // 将解构赋值移动到函数内部
            const { pinyin } = window.pinyinPro;

            const input = document.getElementById('inputArea').value;
            const removeSpace = document.getElementById('removeSpace').checked;
            
            if (!input.trim()) {
                alert('请先输入内容');
                return;
            }

            const lines = input.split('\n');
            const result = lines.map(line => {
                if (!line.trim()) return '';
                
                // 转换为拼音
                let p = pinyin(line, { toneType: 'none', nonZh: 'consecutive' });
                
                if (removeSpace) {
                    // 去除拼音间的空格，并只保留字母和数字
                    return p.replace(/\s+/g, '').toLowerCase().replace(/[^a-z0-9]/g, '');
                }
                return p.toLowerCase();
            });

            document.getElementById('outputArea').value = result.join('\n');
        }

        function copyResult() {
            const output = document.getElementById('outputArea');
            if (!output.value) return;
            
            output.select();
            document.execCommand('copy');
            alert('结果已复制到剪贴板');
        }

        function clearAll() {
            document.getElementById('inputArea').value = '';
            document.getElementById('outputArea').value = '';
        }
    </script>

</body>
</html>
