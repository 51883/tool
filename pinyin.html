<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文转拼音 - 域名助手</title>
    
    <script src="https://unpkg.com/pinyin-pro/dist/index.js" onerror="loadFallback()"></script>
    
    <script>
        function loadFallback() {
            console.warn('主 CDN 加载失败，正在切换备用 CDN...');
            var script = document.createElement('script');
            script.src = 'https://npm.elemecdn.com/pinyin-pro/dist/index.js';
            document.head.appendChild(script);
        }
    </script>

    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 20px;
            font-size: 24px;
        }
        .description {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            text-align: center;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
        }
        textarea {
            width: 100%;
            height: 300px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            resize: vertical;
            font-family: monospace;
        }
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(74,144,226,0.2);
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }
        .btn-convert {
            background-color: var(--primary-color);
            color: white;
        }
        .btn-convert:hover { background-color: #357abd; }
        .btn-copy {
            background-color: #2ecc71;
            color: white;
        }
        .btn-copy:hover { background-color: #27ae60; }
        .btn-clear {
            background-color: #e74c3c;
            color: white;
        }
        .btn-clear:hover { background-color: #c0392b; }
        .options {
            margin-top: 15px;
            font-size: 13px;
            color: #555;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>中文转拼音 (域名专用)</h1>
    <p class="description">输入多行中文关键词，自动转为无声调拼音，适用于域名注册查询。</p>
    
    <div class="grid">
        <div>
            <label>输入中文关键词 (每行一个):</label>
            <textarea id="inputArea" placeholder="例如：&#10;百度&#10;阿里云&#10;腾讯云"></textarea>
        </div>
        <div>
            <label>转换结果 (拼音):</label>
            <textarea id="outputArea" readonly placeholder="结果将显示在这里..."></textarea>
        </div>
    </div>

    <div class="options">
        <label><input type="checkbox" id="removeSpace" checked> 去除空格 (适合域名)</label>
    </div>

    <div class="controls">
        <button class="btn-convert" onclick="convertPinyin()">立即转换</button>
        <button class="btn-copy" onclick="copyResult()">复制结果</button>
        <button class="btn-clear" onclick="clearAll()">清空</button>
    </div>
</div>

<script>
    function convertPinyin() {
        if (typeof window.pinyinPro === 'undefined') {
            alert('拼音组件还在加载中，请再等一两秒后重试。');
            return;
        }

        const { pinyin } = window.pinyinPro;
        const input = document.getElementById('inputArea').value;
        const removeSpace = document.getElementById('removeSpace').checked;
        
        if (!input.trim()) {
            alert('请先输入内容');
            return;
        }

        const lines = input.split('\n');
        const result = lines.map(line => {
            if (!line.trim()) return '';
            
            let p = pinyin(line, { toneType: 'none', nonZh: 'consecutive' });
            
            if (removeSpace) {
                return p.replace(/\s+/g, '').toLowerCase().replace(/[^a-z0-9]/g, '');
            }
            return p.toLowerCase();
        });

        document.getElementById('outputArea').value = result.join('\n');
    }

    async function copyResult() {
        const output = document.getElementById('outputArea');
        const textToCopy = output.value;
        if (!textToCopy) return;

        try {
            if (navigator.clipboard && window.isSecureContext) {
                await navigator.clipboard.writeText(textToCopy);
                alert('结果已复制到剪贴板');
            } else {
                throw new Error('Fallback');
            }
        } catch (err) {
            output.select();
            output.setSelectionRange(0, 99999);
            try {
                document.execCommand('copy');
                alert('结果已复制到剪贴板');
            } catch (copyErr) {
                alert('由于 iframe 安全限制，自动复制失败，请手动全选复制。');
            }
        }
    }

    function clearAll() {
        document.getElementById('inputArea').value = '';
        document.getElementById('outputArea').value = '';
    }
</script>

</body>
</html>
